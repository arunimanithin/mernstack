<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="card">

  <!-- Header -->
  <div class="card-header">
    <h1>📋 Task Manager</h1>
    <p>Stay on top of your day, one task at a time.</p>
  </div>

  <!-- Input -->
  <div class="input-section">
    <input
      type="text"
      id="taskInput"
      placeholder="Add a new task…"
      autocomplete="off"
      maxlength="200"
    />
    <button id="addBtn">Add Task</button>
  </div>

  <!-- Stats -->
  <div class="stats">
    <span id="statTotal">0 tasks</span>
    <span id="statDone">0 completed</span>
    <span id="statPending">0 remaining</span>
  </div>

  <!-- Task List -->
  <ul id="taskList">
    <li class="empty-state" id="emptyState">
      <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2
             M9 5a2 2 0 002 2h2a2 2 0 002-2
             M9 5a2 2 0 012-2h2a2 2 0 012 2" />
      </svg>
      <p>No tasks yet. Add one above to get started!</p>
    </li>
  </ul>

  <!-- Footer -->
  <div class="card-footer">
    <button id="clearDoneBtn">Clear completed</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
