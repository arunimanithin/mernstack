<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <style>
    /* ── Tokens ──────────────────────────────────────────── */
    :root {
      --bg:        #F7F6F3;
      --surface:   #FFFFFF;
      --ink:       #1A1A2E;
      --muted:     #7B7B8F;
      --accent:    #4F46E5;
      --accent-lt: #EEF2FF;
      --done-clr:  #16A34A;
      --done-bg:   #F0FDF4;
      --danger:    #DC2626;
      --border:    #E4E4F0;
      --radius:    10px;
      --shadow:    0 2px 12px rgba(79,70,229,.08);
      --ff-head:   'Segoe UI', system-ui, sans-serif;
    }

    /* ── Reset ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: var(--ff-head);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
    }

    /* ── Card ────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: 16px;
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 520px;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────────────── */
    .card-header {
      background: var(--accent);
      padding: 28px 28px 24px;
    }

    .card-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -.3px;
    }

    .card-header p {
      margin-top: 4px;
      font-size: .85rem;
      color: rgba(255,255,255,.72);
    }

    /* ── Input section ───────────────────────────────────── */
    .input-section {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }

    #taskInput {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: .95rem;
      font-family: inherit;
      color: var(--ink);
      background: var(--bg);
      outline: none;
      transition: border-color .18s;
    }

    #taskInput:focus {
      border-color: var(--accent);
      background: #fff;
    }

    #taskInput::placeholder { color: var(--muted); }

    #addBtn {
      padding: 10px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background .18s, transform .1s;
    }

    #addBtn:hover  { background: #4338CA; }
    #addBtn:active { transform: scale(.97); }

    /* ── Stats bar ───────────────────────────────────────── */
    .stats {
      display: flex;
      gap: 20px;
      padding: 12px 24px;
      background: var(--accent-lt);
      font-size: .8rem;
      color: var(--accent);
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }

    /* ── Task list ───────────────────────────────────────── */
    #taskList {
      list-style: none;
      padding: 12px 0;
      min-height: 60px;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 40px 24px;
      color: var(--muted);
    }

    .empty-state svg {
      display: block;
      margin: 0 auto 12px;
      opacity: .35;
    }

    .empty-state p { font-size: .9rem; }

    /* ── Task item ───────────────────────────────────────── */
    li.task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      animation: slideIn .22s ease;
      transition: background .15s;
    }

    li.task-item:last-child  { border-bottom: none; }
    li.task-item:hover       { background: #FAFAFE; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Checkbox-style complete button */
    .btn-complete {
      width: 22px;
      height: 22px;
      min-width: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color .18s, background .18s;
      padding: 0;
    }

    .btn-complete:hover { border-color: var(--done-clr); }

    .btn-complete .check-icon { display: none; }

    /* Task name */
    .task-name {
      flex: 1;
      font-size: .95rem;
      line-height: 1.4;
      word-break: break-word;
      transition: color .18s;
    }

    /* Delete button */
    .btn-delete {
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      transition: color .15s, background .15s;
    }

    .btn-delete:hover {
      color: var(--danger);
      background: #FEF2F2;
    }

    /* ── Completed state ─────────────────────────────────── */
    li.task-item.done { background: var(--done-bg); }

    li.task-item.done .btn-complete {
      background: var(--done-clr);
      border-color: var(--done-clr);
    }

    li.task-item.done .btn-complete .check-icon { display: block; }

    li.task-item.done .task-name {
      text-decoration: line-through;
      color: var(--muted);
    }

    /* ── Footer ──────────────────────────────────────────── */
    .card-footer {
      padding: 14px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
    }

    #clearDoneBtn {
      background: transparent;
      border: none;
      font-size: .8rem;
      color: var(--muted);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color .15s, background .15s;
    }

    #clearDoneBtn:hover {
      color: var(--danger);
      background: #FEF2F2;
    }
  </style>
</head>
<body>

<div class="card">

  <!-- Header -->
  <div class="card-header">
    <h1>📋 Task Manager</h1>
    <p>Stay on top of your day, one task at a time.</p>
  </div>

  <!-- Input -->
  <div class="input-section">
    <input
      type="text"
      id="taskInput"
      placeholder="Add a new task…"
      autocomplete="off"
      maxlength="200"
    />
    <button id="addBtn">Add Task</button>
  </div>

  <!-- Stats -->
  <div class="stats">
    <span id="statTotal">0 tasks</span>
    <span id="statDone">0 completed</span>
    <span id="statPending">0 remaining</span>
  </div>

  <!-- Task List -->
  <ul id="taskList">
    <li class="empty-state" id="emptyState">
      <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2
             M9 5a2 2 0 002 2h2a2 2 0 002-2
             M9 5a2 2 0 012-2h2a2 2 0 012 2" />
      </svg>
      <p>No tasks yet. Add one above to get started!</p>
    </li>
  </ul>

  <!-- Footer -->
  <div class="card-footer">
    <button id="clearDoneBtn">Clear completed</button>
  </div>

</div>

<script>
  // ── State ────────────────────────────────────────────────
  let tasks = [];
  let nextId = 1;

  // ── DOM refs ─────────────────────────────────────────────
  const taskInput   = document.getElementById('taskInput');
  const addBtn      = document.getElementById('addBtn');
  const taskList    = document.getElementById('taskList');
  const emptyState  = document.getElementById('emptyState');
  const clearDoneBtn = document.getElementById('clearDoneBtn');
  const statTotal   = document.getElementById('statTotal');
  const statDone    = document.getElementById('statDone');
  const statPending = document.getElementById('statPending');

  // ── Add task ─────────────────────────────────────────────
  function addTask() {
    const name = taskInput.value.trim();
    if (!name) {
      taskInput.focus();
      taskInput.style.borderColor = '#DC2626';
      setTimeout(() => taskInput.style.borderColor = '', 800);
      return;
    }

    tasks.push({ id: nextId++, name, done: false });
    taskInput.value = '';
    taskInput.focus();
    render();
  }

  // ── Toggle complete ───────────────────────────────────────
  function toggleTask(id) {
    const task = tasks.find(t => t.id === id);
    if (task) task.done = !task.done;
    render();
  }

  // ── Delete task ───────────────────────────────────────────
  function deleteTask(id) {
    const li = document.querySelector(`[data-id="${id}"]`);
    if (li) {
      li.style.transition = 'opacity .2s, transform .2s';
      li.style.opacity    = '0';
      li.style.transform  = 'translateX(12px)';
      setTimeout(() => {
        tasks = tasks.filter(t => t.id !== id);
        render();
      }, 200);
    }
  }

  // ── Clear completed ───────────────────────────────────────
  function clearCompleted() {
    tasks = tasks.filter(t => !t.done);
    render();
  }

  // ── Render ────────────────────────────────────────────────
  function render() {
    // Remove all task items (keep emptyState node)
    Array.from(taskList.querySelectorAll('.task-item')).forEach(el => el.remove());

    const total   = tasks.length;
    const done    = tasks.filter(t => t.done).length;
    const pending = total - done;

    // Stats
    statTotal.textContent   = `${total} task${total !== 1 ? 's' : ''}`;
    statDone.textContent    = `${done} completed`;
    statPending.textContent = `${pending} remaining`;

    // Empty state
    emptyState.style.display = total === 0 ? 'block' : 'none';

    // Build items
    tasks.forEach(task => {
      const li = document.createElement('li');
      li.className = `task-item${task.done ? ' done' : ''}`;
      li.dataset.id = task.id;

      li.innerHTML = `
        <button class="btn-complete" aria-label="${task.done ? 'Mark incomplete' : 'Mark complete'}">
          <svg class="check-icon" width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <span class="task-name">${escapeHTML(task.name)}</span>
        <button class="btn-delete" aria-label="Delete task">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
            <path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
          </svg>
        </button>
      `;

      li.querySelector('.btn-complete').addEventListener('click', () => toggleTask(task.id));
      li.querySelector('.btn-delete').addEventListener('click', () => deleteTask(task.id));

      taskList.appendChild(li);
    });
  }

  // ── Helpers ───────────────────────────────────────────────
  function escapeHTML(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ── Events ────────────────────────────────────────────────
  addBtn.addEventListener('click', addTask);
  taskInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
  clearDoneBtn.addEventListener('click', clearCompleted);

  // ── Init ──────────────────────────────────────────────────
  render();
</script>
</body>
</html>
